<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">Arcade<span>Hub</span></div>
        <input type="text" id="searchBar" placeholder="Search games...">
    </nav>

    <main class="game-grid" id="gameGrid">
        </main>

    <div id="playerModal" class="modal">
        <div class="modal-container">
            <button class="close-btn" onclick="closeGame()">Return to Home</button>
            <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
